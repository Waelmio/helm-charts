replicaCount: 1

image:
  repository: ghcr.io/waelmio/cal-kg-tracker
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

database:
  # Database type: sqlite or postgres
  type: sqlite

  sqlite:
    dbPath: /data/weighttracker.db
    persistence:
      enabled: true
      storageClass: ""
      existingClaim: ""
      accessMode: ReadWriteOnce
      size: 1Gi

  postgres:
    # Set connectionUrl for a full DSN, or fill in the individual fields below.
    # connectionUrl takes precedence when set.
    connectionUrl: ""
    host: ""
    db: weighttracker
    user: postgres
    # Override user from an existing secret instead of the plaintext value above.
    existingUserSecret: ""
    existingUserSecretKey: username
    password: ""
    # Override password from an existing secret instead of the plaintext value above.
    existingPasswordSecret: ""
    existingPasswordSecretKey: password

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10

nodeSelector: {}

tolerations: []

affinity: {}
