# Admin UI — ClusterIP, consumed by Traefik IngressRoute
apiVersion: v1
kind: Service
metadata:
  name: {{ include "technitium.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "technitium.labels" . | nindent 4 }}
spec:
  type: {{ .Values.adminService.type }}
  ports:
    - name: http
      port: {{ .Values.adminService.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "technitium.selectorLabels" . | nindent 4 }}
---
# DNS — LoadBalancer with mixed TCP+UDP on port 53
apiVersion: v1
kind: Service
metadata:
  name: {{ include "technitium.fullname" . }}-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "technitium.labels" . | nindent 4 }}
  {{- with .Values.dnsService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.dnsService.type }}
  {{- if .Values.dnsService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.dnsService.loadBalancerIP }}
  {{- end }}
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
  selector:
    {{- include "technitium.selectorLabels" . | nindent 4 }}
