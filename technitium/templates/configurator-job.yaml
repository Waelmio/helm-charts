{{- if .Values.configurator.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "technitium.fullname" . }}-configurator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "technitium.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "technitium.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for Technitium API to be ready before applying config
        - name: wait-for-technitium
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -qO- http://{{ include "technitium.fullname" . }}:{{ .Values.adminService.port }}/ > /dev/null 2>&1; do
                echo "Waiting for Technitium...";
                sleep 3;
              done
              echo "Technitium is ready."
      containers:
        - name: configurator
          image: "{{ .Values.configurator.image.repository }}:{{ .Values.configurator.image.tag }}"
          imagePullPolicy: {{ .Values.configurator.image.pullPolicy }}
          args:
            - configure
            - -config
            - /config/config.yaml
          env:
            - name: DNS_API_URL
              value: "http://{{ include "technitium.fullname" . }}:{{ .Values.adminService.port }}"
            - name: DNS_USERNAME
              {{- if .Values.adminUsername.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminUsername.existingSecret }}
                  key: {{ .Values.adminUsername.existingSecretKey }}
              {{- else }}
              value: {{ .Values.adminUsername.value | quote }}
              {{- end }}
            - name: DNS_PASSWORD
              {{- if .Values.adminPassword.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminPassword.existingSecret }}
                  key: {{ .Values.adminPassword.existingSecretKey }}
              {{- else }}
              value: {{ .Values.adminPassword.value | quote }}
              {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: {{ include "technitium.fullname" . }}-configurator
{{- end }}
